<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Retention & LTV calculator with power law fit, industry presets, and breakeven visualization." />
    <title>Retention & LTV Calculator</title>
    <script>
      // Apply theme before stylesheets load — avoids dark→light flash on
      // light-theme reload. Reads localStorage first, then prefers-color-scheme.
      (function () {
        try {
          var saved = localStorage.getItem('rcl_theme')
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body class="bg-bg text-fg">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
