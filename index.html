    <script>
      // Apply theme before stylesheets load — avoids dark→light flash on
      // light-theme reload. Reads localStorage first, then prefers-color-scheme.
      (function () {
        try {
          var saved = localStorage.getItem('rcl_theme')
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
