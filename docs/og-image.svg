<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Decorative subtle grid lines mimicking the chart panel -->
  <g stroke="#1f2937" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>

  <!-- Right-side stylized power-law curve with confidence band -->
  <!-- Confidence band (filled) -->
  <path d="M 640 180 C 760 260, 860 360, 1140 440 L 1140 520 C 860 460, 760 400, 640 280 Z"
        fill="#22d3ee" opacity="0.10"/>

  <!-- Confidence band edges -->
  <path d="M 640 180 C 760 260, 860 360, 1140 440"
        stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.45" stroke-dasharray="4 4"/>
  <path d="M 640 280 C 760 400, 860 460, 1140 520"
        stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.45" stroke-dasharray="4 4"/>

  <!-- Main fit curve (R(t) = a · t^−b) -->
  <path d="M 640 220 C 760 320, 860 410, 1140 480"
        stroke="#22d3ee" stroke-width="4" fill="none"/>

  <!-- User retention points on the curve -->
  <g fill="#22d3ee">
    <circle cx="640" cy="220" r="7"/>
    <circle cx="760" cy="320" r="7"/>
    <circle cx="900" cy="410" r="7"/>
    <circle cx="1080" cy="475" r="7"/>
  </g>
  <g fill="#0d1117" stroke="#22d3ee" stroke-width="2">
    <circle cx="640" cy="220" r="4"/>
    <circle cx="760" cy="320" r="4"/>
    <circle cx="900" cy="410" r="4"/>
    <circle cx="1080" cy="475" r="4"/>
  </g>

  <!-- Curve label -->
  <text x="1140" y="430" font-size="18" font-weight="500" fill="#67e8f9" text-anchor="end">
    R(t) = a · t⁻ᵇ
  </text>

  <!-- Left-side text block -->
  <text x="80" y="160" font-size="22" font-weight="600" fill="#94a3b8" letter-spacing="6">
    RETENTION &amp; LTV
  </text>

  <text x="80" y="280" font-size="96" font-weight="700" fill="#f1f5f9" letter-spacing="-2">
    Calculator
  </text>

  <text x="80" y="340" font-size="30" font-weight="400" fill="#cbd5e1">
    Power-law cohort modeling. No black box.
  </text>

  <!-- Feature bullets -->
  <g font-size="20" font-weight="500" fill="#67e8f9">
    <text x="80" y="430">
      <tspan fill="#475569">▸</tspan>  Day · Week · Month · Year cadence
    </text>
    <text x="80" y="465">
      <tspan fill="#475569">▸</tspan>  N-step funnel · paid-trial fees · refund rate
    </text>
    <text x="80" y="500">
      <tspan fill="#475569">▸</tspan>  Two LTV reads · confidence band · 14 industry presets
    </text>
  </g>

  <!-- URL footer -->
  <text x="80" y="590" font-size="22" font-weight="500" fill="#64748b">
    cosmiksoul.github.io/retention-calculator
  </text>
</svg>
